# CARVE master config. Everything is config-driven; scripts read this. Values in
# [brackets]/TODO must be set during Phase 0 and reflected in PREREGISTRATION.md.

seed: 0
seeds: [0, 1, 2]          # headline numbers averaged over these
device: auto              # auto -> cuda > mps > cpu

paths:
  data_root: data/                       # git-ignored
  weights_root: weights/                 # git-ignored
  splits_dir: data/splits/
  runs_dir: experiments/runs/            # git-ignored; one dir per run

dataset:
  # CANVAS RESOLVED (2026-07-03): primary = ISIC-2018 Task3 (HAM10000), the reservoir
  # canvas, because the Bissoto artifact annotations are NOT available locally → no
  # verified-clean filter and no Bissoto real-artifact slice (see docs/LOG.md). Injection
  # is onto HAM10000 images; the gold counterfactual (inject/remove) still owns each
  # injected artifact's causal effect regardless of any pre-existing real artifacts.
  name: isic2018_task3                    # HAM10000 canvas (mel-vs-nevus)
  task: melanoma_vs_nevus                 # binary: MEL(pos)=1 vs NV(neg)=0
  pos_class: MEL
  neg_class: NV
  root: data/isic2018                     # under paths.data_root; symlinked, git-ignored
  image_subdir: ISIC2018_Task3_Training_Input
  groundtruth_csv: ISIC2018_Task3_Training_GroundTruth/ISIC2018_Task3_Training_GroundTruth.csv
  image_size: 224
  # n=7818 (MEL 1113 / NV 6705, ~6:1) — stratify splits + class-weight the probe.
  splits:                                # fractions; must be disjoint
    probe_train: 0.40
    sae_train: 0.25
    select: 0.10
    eval: 0.15
    test: 0.10

model:
  # D1 RESOLVED (2026-06-30): primary = MONET (public weights; DermFM-Zero weights are
  # private/on-request so unusable). Confirm HookedViT activation access in Phase 0.
  primary: monet           # CLIP ViT-L/14, ~105k derm image-text pairs (Kim et al. Nat.Med.2024)
  generality: clip-vit-b16 # ViT-Prisma ships pretrained SAEs for this
  freeze_encoder: true
  decision_signal: logit_margin   # z_pos - z_neg
  # Two bias arms (see docs/DATASETS.md): zero_shot uses MONET text prompts with NO trained
  # head (purest causal GT); induced trains the probe below on a rho-biased set.
  bias_arms: [zero_shot, induced]
  zero_shot_prompts:
    pos: "a dermoscopic image of melanoma"
    neg: "a dermoscopic image of a benign nevus"
  layer_rule: max_artifact_decodability_on_select   # pre-committed; full sweep still logged
  layer_sweep: [4, 6, 8, 10]      # report all; pick by rule

artifacts:
  # DEFAULT = real photographic overlays (rulers m*.png + arrows a*.png), bundled under
  # src/carve/data/overlays/ and composited with their own alpha. overlay_both layers both.
  types: [ruler, arrow, black_corner]         # NEW set: real ruler+arrow + hard-circle vignette. also available: overlay_both
  legacy_types: [ruler_synthetic, marker_ink, dark_corner]  # opt-in synthetic marks (old set)
  opacity: [0.4, 0.7, 1.0]
  rho: [0.5, 0.7, 0.9, 1.0]                  # spurious-correlation strength
  real_overlay: true                          # Phase-7 real-artifact slice (Bissoto)
  store_mask: true

sae:
  source: train            # train (on medical FM) | pretrained (Prisma, for generality)
  kind: topk
  layer: 12                # MONET vision block ℓ the SAE is trained on (d=1024)
  tokens: patch            # train on patch+CLS tokens (spatial artifacts live in patches)
  width: 4096              # FROZEN: health-selected (dead ≈9.6%, R² ≈0.99). 16384 is ~55% dead.
  k: 32                    # FROZEN (PREREGISTRATION §4)
  feature_set_size_m: 1    # allow >1 if feature is polysemantic
  train:
    steps: 3000
    batch: 4096
    lr: 0.001
    aux_k: 256             # AuxK dead-feature revival (Gao 2024); 0 = plain TopK
    dead_window: 200       # steps unfired ⇒ feature is auxk-eligible ("dead")
  selection:
    oracle: top_auroc_on_select
    discovered: top_activation_variance_unsupervised

interventions:
  ops: [ablate, steer]
  steer_coeffs: [-1.0, -2.0, -4.0]   # magnitudes; applied as recovery-direction subtraction (PREREG §2)
  recovery_eps: 0.001                 # FROZEN: skip per-image |e_in| < eps
  feature_set_sizes: [1, 3, 5, 10, 20]   # #1: SAE-ablation m-sweep (features ablated together)
  steer_grid: [0.5, 1.0, 2.0, 3.0, 4.0, 6.0, 8.0, 12.0, 16.0]  # #2: best-case steering coeff search

baselines:
  # dermfmzero_suppress = top-k SAE-neuron zeroing per artifact (reimplemented from
  # arXiv 2602.10624 description; see docs/NOVELTY.md). Benchmarking it on our controlled
  # ground truth is both a fair comparison and our differentiation from that paper.
  enabled: [raw_neuron, cav_reveal2revise, cdep, dermfmzero_suppress, random_ctrl, input_oracle]
  dermfmzero_suppress:
    top_k: 5               # their "top five neurons most activated by each artifact type"

eval:
  bootstrap_resamples: 1000
  ci: 0.95

output:
  save_per_image: true     # raw per-image outputs -> parquet in run dir
  save_metrics_json: true
